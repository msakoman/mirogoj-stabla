async function deleteTree() {
    const id = document.getElementById('tree-id').value;
    if (!id || !confirm('Obriši ovo stablo?')) return;
    try {
        // Pokušaj obrisati sve fotografije iz Storage-a
        const urls = [1, 2, 3].map(i => document.getElementById(`tree-photo-url-${i}`).value).filter(Boolean);
        for (const url of urls) {
            try { await firebase.storage().refFromURL(url).delete(); } catch (_) {}
        }
        await firebase.firestore().collection('trees').doc(id).delete();
        treeModalBS.hide();
    } catch (e) { alert(e.message); }
}

        document.getElementById(`upload-progress-bar-${idx}`).style.display = 'none';
        document.getElementById(`upload-progress-${idx}`).style.width = '0%';
    });
}

function showPhotoPreview(url, idx) {
    if (url) {
        document.getElementById(`photo-preview-${idx}`).src = url;
        document.getElementById(`photo-preview-wrap-${idx}`).style.display = 'block';
    } else {
        document.getElementById(`photo-preview-wrap-${idx}`).style.display = 'none';
    }
    document.getElementById(`tree-photo-url-${idx}`).value = url || '';
}
